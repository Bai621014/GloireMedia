<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GloireMedia | Studio Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
</head>
<body>
    <nav class="navbar">
        <div class="logo">GloireMedia</div>
        <div class="nav-actions">
            <button id="upload_widget" class="upload-btn">📷 + Publier</button>
            <button class="prod-btn" onclick="alert('Module de production activé')">🎥 Production</button>
        </div>
    </nav>

    <main>
        <section id="live-healing-streams">
            <div class="video-wrapper">
                <iframe src="https://healingstreams.tv/zone/Wez3" allow="fullscreen" allowfullscreen></iframe>
            </div>
        </section>

        <section id="video-feed">
            <h2 class="section-title">Actualités GloireHub</h2>
            <div id="grid" class="video-grid"></div>
        </section>
    </main>

    <script>
        var myWidget = cloudinary.createUploadWidget({
            cloudName: 'dvoya2e3o',
            uploadPreset: 'gloiremedia_unsigned'
        }, (error, result) => {
            if (!error && result && result.event === "success") {
                const grid = document.getElementById('grid');
                const fileUrl = result.info.secure_url;
                const isVideo = result.info.resource_type === 'video';
                
                let content = isVideo ? 
                    `<video width="100%" controls><source src="${fileUrl}" type="video/mp4"></video>` : 
                    `<img src="${fileUrl}" width="100%">`;

                grid.innerHTML += `
                    <div class="video-card">
                        ${content}
                        <h3>Nouvelle Publication</h3>
                    </div>`;
            }
        });

        document.getElementById("upload_widget").addEventListener("click", () => {
            myWidget.open();
        });
    </script>
</body>
</html>
